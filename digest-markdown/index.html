**Issue #12 — June 12, 2026**

Some weeks the throughline finds you. This issue kept circling back to feedback — not the red-pen kind, but the quiet, well-timed nudge that helps a learner adjust before a habit sets. I read four pieces that, together, made me rethink how often I confuse *grading* with *responding*. As always, the summaries below are my own framing; follow the links for the full arguments.

## Article Navigation

- #1 — Feedback That Arrives in Time
- #2 — The Comment Nobody Reads
- #3 — Peer Review Without the Pile-Up
- #4 — Rubrics as Conversation Starters

---

## #1 - Feedback That Arrives in Time

> Image: a clean visual of a stopwatch resting on an open notebook, soft daylight.

### The Big Idea
Feedback loses most of its value the moment it goes cold. The piece argues that *timing* outranks *thoroughness*: a short note delivered while the work is still warm beats an essay of corrections returned two weeks later.

### Why It Matters
When response is delayed, students have already moved on — and so have their misconceptions, now quietly reinforced. Fast, lightweight feedback keeps the learner in a position to actually act on it.

### Practical Takeaways
- Aim for a 48-hour response window on formative work, even if the note is brief.
- Replace one long end-of-unit comment with three short mid-unit ones.
- Use a quick voice memo or margin note instead of a polished paragraph.

**Source:** [Timely Practice Review](https://www.example.org/feedback-in-time)
**Author:** Dr. Renata Foss

---

## #2 - The Comment Nobody Reads

> Image: a clean visual of a returned paper with untouched margin notes.

### The Big Idea
Most written feedback is never used, not because students don't care, but because it's framed as a verdict rather than a next step. Reframing comments as a single actionable question changes whether they get read at all.

### Why It Matters
If feedback isn't acted on, it isn't feedback — it's just commentary. Shifting from judgment to invitation turns a closed loop into an open one.

### Practical Takeaways
- End each comment with one question the student can answer in a revision.
- Limit yourself to the two highest-leverage notes per piece.
- Ask students to reply to your comment before they revise.

**Source:** [The Margins Journal](https://www.example.org/comment-nobody-reads)
**Author:** Theo Marwick

---

## #3 - Peer Review Without the Pile-Up

> Image: a clean visual of two students trading drafts across a small table.

### The Big Idea
Peer review fails when it's vague ("looks good!") or crushing ("rewrite everything"). Structured prompts that ask reviewers to *notice* before they *judge* produce feedback both sides can use.

### Why It Matters
Done well, peer review multiplies the amount of timely response a learner gets while teaching the reviewer to read critically — a two-for-one that no single teacher can scale alone.

### Practical Takeaways
- Give reviewers a sentence stem: "One thing that worked for me was…"
- Cap each review at three observations to prevent overwhelm.
- Have authors mark *what kind* of feedback they want before sharing.

**Source:** [Collaborative Classroom Notes](https://www.example.org/peer-review-pileup)
**Author:** Mireille Adebayo

---

## #4 - Rubrics as Conversation Starters

> Image: a clean visual of a simple rubric pinned beside a whiteboard.

### The Big Idea
A rubric isn't a scoring machine; it's a shared vocabulary. The article makes the case for co-building rubrics with students so the criteria become something they can talk about, not just be measured against.

### Why It Matters
When learners help name what quality looks like, they can self-assess long before the work reaches you — closing the feedback loop from the inside.

### Practical Takeaways
- Draft one rubric row together as a class before an assignment.
- Translate jargon into student language ("clear" beats "demonstrates clarity").
- Let students annotate their own work against the rubric before submitting.

**Source:** [Assessment Dialogues](https://www.example.org/rubrics-conversation)
**Author:** Sam Okonkwo

---

## Closing Reflection

The thread running through all four reads: feedback is a relationship, not a transaction. Speed, specificity, and shared language each turn a one-way verdict into a back-and-forth a learner can grow inside. This week I'm picking one class and trying the 48-hour rule. We'll see what loosens.

See you in the next loop.

**Issue #11 — May 29, 2026**

This issue is a love letter to restraint. The best classroom technology I encountered this month did one thing well and then disappeared — no dashboards demanding attention, no badges, no friction. The four pieces below all wrestle with the same question: how do we choose tools that serve the lesson instead of becoming the lesson? My summaries; the links carry the full case.

## Article Navigation

- #1 — The Tool That Disappears
- #2 — Notifications Are a Curriculum
- #3 — One Login Is a Feature
- #4 — When "No Tech" Is the Right Tech

---

## #1 - The Tool That Disappears

> Image: a clean visual of a single uncluttered app screen with one button.

### The Big Idea
The most effective digital tools are the ones students stop noticing. The article frames "invisibility" as a design goal: the moment a tool calls attention to itself, it's competing with the learning instead of supporting it.

### Why It Matters
Cognitive load is finite. Every menu, popup, and setting a learner has to manage is attention borrowed from the actual task.

### Practical Takeaways
- Before adopting a tool, count the clicks to the core action — fewer is better.
- Prefer tools that work without an onboarding tour.
- Audit one app this month for features your class never uses.

**Source:** [Quiet Tools Review](https://www.example.org/tool-that-disappears)
**Author:** Dr. Iris Calderón

---

## #2 - Notifications Are a Curriculum

> Image: a clean visual of a phone face-down beside a stack of library books.

### The Big Idea
Every notification a platform sends teaches students what to value. The piece argues that default alerts quietly train attention toward whatever the vendor wants engaged with — not necessarily what we want learned.

### Why It Matters
Attention is the scarcest resource in any classroom. If a tool's notifications fragment it, the tool is working against you no matter how good its features are.

### Practical Takeaways
- Turn off non-essential notifications as part of setup, not as an afterthought.
- Discuss alert design with students as a media-literacy lesson.
- Choose tools that let *you* control the cadence of reminders.

**Source:** [Attention Ledger](https://www.example.org/notifications-curriculum)
**Author:** Bram Henley

---

## #3 - One Login Is a Feature

> Image: a clean visual of a single key on a plain keyring.

### The Big Idea
Tool sprawl has a hidden cost: every separate account is a small barrier that compounds across a day. The article makes the unglamorous case that consolidation and single sign-on are pedagogical wins, not just IT conveniences.

### Why It Matters
Minutes lost to password resets and account-juggling are minutes not spent learning — and the friction falls hardest on the students with the least support at home.

### Practical Takeaways
- Favor tools that integrate with your existing sign-on.
- Retire one redundant app each term to fight sprawl.
- Track how many logins a typical lesson actually requires.

**Source:** [Frictionless Schools](https://www.example.org/one-login-feature)
**Author:** Nadia Voss

---

## #4 - When "No Tech" Is the Right Tech

> Image: a clean visual of an index card and a pencil on a wooden desk.

### The Big Idea
The most countercultural move in this issue: sometimes the best tool is paper. The article isn't anti-technology; it's pro-fit, arguing we should reach for the lightest tool that accomplishes the goal.

### Why It Matters
Defaulting to the screen can crowd out exactly the slow, tactile thinking some lessons need. Choosing *not* to digitize is itself a design decision worth making on purpose.

### Practical Takeaways
- Ask "what would this look like with no device?" before adding one.
- Reserve screens for tasks they uniquely enable.
- Mix analog and digital deliberately rather than by habit.

**Source:** [Right-Sized Learning](https://www.example.org/no-tech-right-tech)
**Author:** Caleb Ofori

---

## Closing Reflection

If there's a takeaway across these four, it's that good tool choices are mostly subtraction. Fewer clicks, fewer alerts, fewer logins, fewer screens-by-default. The work is in saying no often enough that the few tools we keep can actually disappear into the learning. This week I'm cutting one app. It won't be missed.

See you in the next loop.

  <script type="text/markdown" id="md-issue-10"># The Reading Loop

**Issue #10 — May 15, 2026**

A milestone issue, and fittingly it's about the one resource we keep pretending is infinite: attention. Everything I read this fortnight pushed on the idea that attention isn't something we capture from learners — it's something we help them build, protect, and direct. Four pieces below, framed in my own words; the links hold the originals.

## Article Navigation

- #1 — Attention Is Built, Not Grabbed
- #2 — The Myth of Multitasking Students
- #3 — Designing for the First Five Minutes
- #4 — Boredom Has a Job to Do

---

## #1 - Attention Is Built, Not Grabbed

> Image: a clean visual of a sprout breaking through soil in morning light.

### The Big Idea
We talk about "grabbing" attention as if it were a resource to seize. The article reframes it as a *capacity* learners develop over time — more like a muscle than a switch.

### Why It Matters
If attention is built, then constant novelty and stimulation may be training exactly the wrong thing: the expectation that focus should be effortless and externally supplied.

### Practical Takeaways
- Protect short stretches of single-task work and grow them gradually.
- Name attention as a skill students can practice, not a trait they have or lack.
- Resist the urge to add stimulation when engagement dips — try subtracting instead.

**Source:** [Focus & Learning Review](https://www.example.org/attention-is-built)
**Author:** Dr. Lena Marquez

---

## #2 - The Myth of Multitasking Students

> Image: a clean visual of two overlapping clocks slightly out of sync.

### The Big Idea
The piece dismantles the comforting belief that today's learners are uniquely wired to multitask. What looks like parallel work is rapid, costly switching — and the cost is paid in comprehension.

### Why It Matters
Designing lessons around the assumption of seamless multitasking quietly lowers the depth of thinking we ask for. Naming the myth lets us design for focus honestly.

### Practical Takeaways
- Build "one tab" norms for tasks that need depth.
- Show students the switching cost with a quick in-class demo.
- Sequence tasks instead of stacking them.

**Source:** [Cognition Notes](https://www.example.org/multitasking-myth)
**Author:** Devon Achterberg

---

## #3 - Designing for the First Five Minutes

> Image: a clean visual of an open door with light spilling into a quiet room.

### The Big Idea
The opening of a lesson sets the attentional tone for everything after it. The article argues for treating the first five minutes as a deliberate on-ramp rather than logistics-and-housekeeping time.

### Why It Matters
Attention has inertia. A scattered start is hard to recover from; a focused one carries learners through the harder middle.

### Practical Takeaways
- Open with one concrete question instead of announcements.
- Move housekeeping to the end where it costs less focus.
- Use a consistent ritual so the brain knows "we're starting now."

**Source:** [Lesson Design Quarterly](https://www.example.org/first-five-minutes)
**Author:** Priya Sundaram

---

## #4 - Boredom Has a Job to Do

> Image: a clean visual of a person gazing out a rain-streaked window.

### The Big Idea
The most provocative read of the issue: boredom isn't a failure of engagement but a precursor to it. The article suggests that always-on stimulation deprives learners of the restless space where curiosity and original thinking start.

### Why It Matters
If we engineer away every dull moment, we may also engineer away the daydreaming that lets ideas connect. A little boredom is generative.

### Practical Takeaways
- Leave unstructured thinking time without rushing to fill it.
- Reframe "I'm bored" as an invitation rather than an emergency.
- Resist the impulse to gamify every quiet stretch.

**Source:** [The Slow Classroom](https://www.example.org/boredom-has-a-job)
**Author:** Yusuf El-Amin

---

## Closing Reflection

Ten issues in, this is the one I'll keep coming back to. Attention isn't a prize we win from learners with brighter, faster, louder lessons — it's a capacity we either cultivate or erode with every design choice. This week I'm guarding the first five minutes and leaving a little room for boredom. Counterintuitive, maybe. Worth trying.

See you in the next loop.

      const li = document.createElement("li");
      const a = document.createElement("a");
      a.className = "issue-link" + (iss.id === activeId ? " active" : "");
      a.href = "?issue=" + encodeURIComponent(iss.id);
      a.innerHTML =
        '<span class="it-title">' + iss.title + '</span>' +
        '<span class="it-date">' + fmtDate(iss.date) + '</span>';
      a.addEventListener("click", (e) => {
        e.preventDefault();
        loadIssue(iss.id, true);
      });
      li.appendChild(a);
      issueListEl.appendChild(li);
    });
  }

  /* ---------- table of contents ---------- */
  function buildTOC(){
    const headings = contentEl.querySelectorAll(".md h2, .md h3");
    tocListEl.innerHTML = "";
    if (!headings.length){
      tocListEl.innerHTML = '<li class="toc-empty">No sections in this issue.</li>';
      return;
    }
    const used = {};
    headings.forEach((h) => {
      let id = slugify(h.textContent);
      if (used[id] != null){ used[id]++; id = id + "-" + used[id]; } else { used[id] = 0; }
      h.id = id;

      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#" + id;
      a.textContent = h.textContent;
      a.className = h.tagName.toLowerCase() === "h3" ? "lvl-3" : "lvl-2";
      a.addEventListener("click", (e) => {
        e.preventDefault();
        h.scrollIntoView({ behavior:"smooth", block:"start" });
        history.replaceState(null, "", "#" + id);
      });
      li.appendChild(a);
      tocListEl.appendChild(li);
    });
  }

  /* ---------- copy bar ---------- */
  // Mount the Export "Copy bar" exactly once. Its getters read the live
  // currentMarkdown variable, so they always reflect the on-screen issue.
  function mountExportBar(){
    if (exportBarMounted || !window.ExportBar) return;
    exportBarMounted = true;
    ExportBar.mount({
      mount: "#exportbar",
      label: "issue",
      getMarkdown: () => currentMarkdown,
      // Clean semantic article HTML only — no TOC/sidebar/chrome.
      getHtml: () => {
        let html = marked.parse(currentMarkdown, { gfm:true, breaks:false });
        if (window.DOMPurify) html = DOMPurify.sanitize(html);
        return html;
      }
    });
  }

  /* ---------- load + render an issue ---------- */
  async function loadIssue(id, pushUrl){
    const iss = sortedIssues.find((x) => x.id === id) || sortedIssues[0];
    if (!iss) return;

    buildIssueList(iss.id);

    if (pushUrl){
      const url = "?issue=" + encodeURIComponent(iss.id);
      history.pushState({ id: iss.id }, "", url);
    }
    document.title = iss.title + " — The Reading Loop";

    contentEl.innerHTML = '<div class="state"><div class="spinner"></div>Loading “' + iss.title + '”…</div>';
    tocListEl.innerHTML = '<li class="toc-empty">Loading…</li>';

    // Read the embedded fallback block, if one exists for this issue.
    // (Used when fetch() is blocked — e.g. when you double-click this page.)
    function embeddedMarkdown(){
      const el = document.getElementById("md-" + iss.id);
      return el ? el.textContent : null;
    }

    let md = null;

    // 1) Try fetching the real .md file (works over http:// and on GitHub Pages).
    try{
      const res = await fetch(iss.file, { cache: "no-cache" });
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + iss.file);
      md = await res.text();
    } catch (err){
      // 2) fetch() failed (most often the file:// double-click case).
      //    Fall back to the markdown embedded in this page.
      md = embeddedMarkdown();
    }

    if (md != null){
      currentMarkdown = md;            // remember the source for the Copy bar
      contentEl.innerHTML = '<div class="md">' + renderMarkdown(md) + '</div>';
      buildTOC();
      mountExportBar();                // mount once, after the first issue renders
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    // 3) Nothing worked: no file reachable AND no embedded block to fall back to.
    contentEl.innerHTML =
      '<div class="state error">' +
        '<h2>Could not load this issue</h2>' +
        '<p>Tried to load <code>' + iss.file + '</code> and could not find a matching ' +
        'embedded block (<code>#md-' + iss.id + '</code>).</p>' +
        '<p>Check that the <code>ISSUES</code> id matches the file, or run a tiny local ' +
        'server from this folder:</p>' +
        '<p><code>python3 -m http.server 8000</code> then open <code>http://localhost:8000</code></p>' +
      '</div>';
    tocListEl.innerHTML = '<li class="toc-empty">Unavailable.</li>';
  }

  /* ---------- routing ---------- */
  function currentIssueId(){
    const params = new URLSearchParams(location.search);
    const fromQuery = params.get("issue");
    if (fromQuery) return fromQuery;
    const fromHash = location.hash.replace(/^#/, "");
    if (fromHash && sortedIssues.some((i) => i.id === fromHash)) return fromHash;
    return sortedIssues[0] && sortedIssues[0].id;
  }

  window.addEventListener("popstate", () => {
    loadIssue(currentIssueId(), false);
  });

  // boot
  loadIssue(currentIssueId(), false);
  </script>
</body>
</html>

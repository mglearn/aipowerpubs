<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field Notes &middot; Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#002855; --navy-900:#001a3d; --navy-700:#003b7a;
  --gold:#FFB81C; --gold-600:#d99a00;
  --ink:#1a2230; --muted:#5a6577; --bg:#f4f6fa; --card:#ffffff; --border:#e2e8f0;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Source Sans 3',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;
}
a{color:inherit;}

/* Header */
.article-header{
  background:var(--navy);
  color:#fff;
  border-bottom:6px solid var(--gold);
  padding:22px 24px 46px;
}
.header-inner{max-width:760px;margin:0 auto;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--gold);text-decoration:none;font-weight:700;
  font-size:.92rem;letter-spacing:.02em;margin-bottom:30px;
}
.back-link:hover{text-decoration:underline;}
.tag{
  display:inline-block;
  font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--navy);background:var(--gold);padding:4px 10px;border-radius:999px;
}
.article-header h1{
  font-family:'Merriweather',Georgia,serif;
  font-weight:900;
  font-size:clamp(1.9rem,4.5vw,2.9rem);
  line-height:1.18;
  margin:16px 0 14px;
  letter-spacing:-.01em;
}
.article-meta{
  font-size:.95rem;color:#c9d6e8;
  display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;
}
.article-meta .dot{color:var(--gold);}

/* Body */
.article-body{
  max-width:720px;margin:0 auto;padding:44px 24px 10px;
  font-family:'Merriweather',Georgia,serif;
  font-size:1.12rem;line-height:1.78;color:var(--ink);
}
.article-body p{margin:0 0 1.25em;}
.article-body h2{
  font-family:'Merriweather',Georgia,serif;font-weight:900;
  color:var(--navy);font-size:1.6rem;line-height:1.25;
  margin:1.8em 0 .55em;
}
.article-body h3{
  font-family:'Merriweather',Georgia,serif;font-weight:700;
  color:var(--navy-700);font-size:1.28rem;margin:1.5em 0 .5em;
}
.article-body h4{
  font-family:'Source Sans 3',sans-serif;font-weight:700;
  color:var(--navy-700);font-size:1.05rem;text-transform:uppercase;
  letter-spacing:.06em;margin:1.4em 0 .4em;
}
.article-body ul,.article-body ol{margin:0 0 1.25em;padding-left:1.4em;}
.article-body li{margin:.4em 0;}
.article-body blockquote{
  margin:1.6em 0;padding:.6em 1.2em;
  border-left:5px solid var(--gold);
  background:rgba(0,40,85,.04);
  font-style:italic;color:var(--navy-700);
  font-size:1.18rem;border-radius:0 8px 8px 0;
}
.article-body a{color:var(--navy-700);text-decoration:underline;text-decoration-color:var(--gold);}
.article-body strong{color:var(--ink);}
.article-body img{max-width:100%;height:auto;border-radius:10px;}
.article-body .img-ph{
  border:2px dashed var(--gold);
  background:rgba(0,40,85,.05);
  color:var(--muted);
  font-style:italic;
  text-align:center;
  padding:34px 22px;
  border-radius:10px;
  margin:1.8em 0;
  font-family:'Source Sans 3',sans-serif;
  font-size:.95rem;
}

/* Footer nav */
.article-footer{
  max-width:720px;margin:30px auto 0;padding:0 24px 10px;
}
.article-footer h2{
  font-family:'Source Sans 3',sans-serif;text-transform:uppercase;
  letter-spacing:.14em;font-size:.85rem;font-weight:700;color:var(--muted);
  border-top:2px solid var(--border);padding-top:26px;margin:0 0 18px;
}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.nav-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px;text-decoration:none;display:block;
  transition:transform .18s ease,box-shadow .18s ease;
}
.nav-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,40,85,.12);}
.nav-card .dir{font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-600);}
.nav-card .nt{font-family:'Merriweather',serif;font-weight:700;color:var(--navy);margin-top:6px;font-size:1.05rem;line-height:1.25;}
.nav-card.next{text-align:right;}

/* States */
.state{text-align:center;padding:80px 24px;color:var(--muted);font-size:1.05rem;}
.state.error{color:#b3261e;}
.spinner{
  width:34px;height:34px;border:3px solid var(--border);
  border-top-color:var(--navy);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Footer */
.site-footer{
  background:var(--navy);color:#fff;margin-top:60px;padding:34px 24px;
  text-align:center;border-top:5px solid var(--gold);
}
.footer-inner{max-width:720px;margin:0 auto;}
.site-footer p{margin:6px 0;font-size:.92rem;}
.site-footer a{color:var(--gold);text-decoration:none;}
.site-footer a:hover{text-decoration:underline;}
.site-footer .cc-line{font-weight:700;}
.site-footer .contact-line{color:#c9d6e8;}

@media(max-width:620px){.nav-grid{grid-template-columns:1fr;}.nav-card.next{text-align:left;}}

/* Print */
@media print{
  body{background:#fff;color:#000;}
  .article-header{background:#fff;color:#000;border-bottom:2px solid #000;padding:0 0 14px;}
  .article-header h1{color:#000;}
  .back-link,.article-footer,.site-footer{display:none !important;}
  .tag{border:1px solid #000;background:#fff;color:#000;}
  .article-meta{color:#333;}
  .article-body{max-width:none;padding:14px 0;font-size:11.5pt;}
  .article-body h2,.article-body h3,.article-body h4{color:#000;}
  .article-body blockquote{background:#fff;border-left:3px solid #000;color:#000;}
  .article-body .img-ph{border:1px dashed #999;background:#fff;}
  a{color:#000;text-decoration:none;}
}
</style>
</head>

  <div class="header-inner">

<script type="application/json" id="demo-data">
{
  "meta": {
    "title": "Field Notes",
    "tagline": "Practical ideas for educators and teams who do the work",
    "issue": "Vol. 3, Issue 2"
  },
  "articles": [
    {
      "id": "small-bets-big-learning",
      "slug": "small-bets-big-learning",
      "title": "Small Bets, Big Learning: Designing Pilots That Actually Stick",
      "category": "Strategy",
      "byline": "Dana Okafor",
      "date": "2026-05-28",
      "excerpt": "Most initiatives die in the gap between a bold plan and a busy Tuesday. Here is a lighter way to test ideas before you commit the whole team.",
      "featured": true,
      "readingMinutes": 6,
      "bodyHtml": "<p>Every team has a graveyard of good intentions: the framework that was rolled out in August and quietly abandoned by October, the platform nobody logs into, the strategy deck that lives only in a shared drive. The problem is rarely the idea. The problem is the distance between a bold plan and a busy Tuesday.</p><h2>Start with a question, not a solution</h2><p>A pilot is not a smaller version of a launch. It is an experiment designed to answer a specific question. Before you choose a tool or a method, write down the one thing you genuinely do not know yet.</p><blockquote>If you already know the answer, you are not running a pilot. You are running a rehearsal.</blockquote><h3>Good pilot questions sound like this</h3><ul><li>Will teachers use this without a mandate?</li><li>Does this save time, or just move the work somewhere else?</li><li>What breaks when we get to twenty users instead of two?</li></ul><div class=\"img-ph\">Image: A whiteboard sketch showing a single question circled in the center of a messy plan.</div><h2>Keep the bet small enough to lose</h2><p>The point of a small bet is that you can walk away from it without political cost. Pick a friendly group, set a fixed end date, and tell everyone up front that stopping is a valid outcome. When people know an experiment is allowed to fail, they tell you the truth about it.</p><h3>Three constraints that keep pilots honest</h3><ul><li><strong>Time:</strong> four to six weeks, never open-ended.</li><li><strong>Scope:</strong> one team, one workflow, one question.</li><li><strong>Exit:</strong> a written definition of what would make you stop.</li></ul><h2>Decide before you start what success looks like</h2><p>Vague pilots produce vague results, and vague results get interpreted by whoever has the most enthusiasm. Agree on a simple signal in advance, even an imperfect one. A short weekly check-in beats a sophisticated dashboard nobody reads.</p><p>When the bet pays off, you scale with evidence instead of optimism. When it does not, you have spent a few weeks instead of a few quarters, and you have a story your team will actually believe.</p>"
    },
    {
      "id": "feedback-that-travels",
      "slug": "feedback-that-travels",
      "title": "Feedback That Travels: Notes People Can Use Tomorrow",
      "category": "Coaching",
      "byline": "Marcus Lin",
      "date": "2026-05-14",
      "excerpt": "Helpful feedback is not about being nicer or harsher. It is about being usable. A few small shifts make notes that move from the page into practice.",
      "featured": false,
      "readingMinutes": 5,
      "bodyHtml": "<p>We tend to argue about feedback in the wrong terms. The debate is usually about tone, soft or direct, generous or blunt. But the feedback that changes behavior has less to do with tone and more to do with whether the person can act on it before they forget it.</p><h2>Name the moment, not the person</h2><p>Compare two notes. One says, \"You need to be more organized.\" The other says, \"In the third segment, the group lost the thread when two instructions arrived at once.\" The second is not softer. It is more useful, because it points at a moment that can be changed.</p><blockquote>People cannot edit a character trait. They can edit a Tuesday.</blockquote><h3>A simple structure that travels</h3><ul><li><strong>Where:</strong> the specific moment you observed.</li><li><strong>What:</strong> what happened, described plainly.</li><li><strong>Next:</strong> one concrete thing to try next time.</li></ul><div class=\"img-ph\">Image: A sticky note with three short lines, labeled Where, What, and Next.</div><h2>One note beats ten</h2><p>The instinct to be thorough often backfires. A page of observations becomes a wall the recipient cannot climb. Choose the single change that would matter most and lead with it. The rest can wait for the next conversation.</p><h2>End with a handoff, not a verdict</h2><p>Close by naming what you will look for next time. This turns feedback from a judgment into a shared project, and it makes the follow-up feel inevitable rather than punitive. The goal is not to be right about the past. It is to be useful about the future.</p>"
    },
    {
      "id": "meetings-worth-the-room",
      "slug": "meetings-worth-the-room",
      "title": "Meetings Worth the Room: A Field Guide to Spending Time Well",
      "category": "Teams",
      "byline": "Priya Raman",
      "date": "2026-04-30",
      "excerpt": "A meeting is the most expensive tool most teams own and the one we plan the least. Here is how to make the calendar earn its keep.",
      "featured": false,
      "readingMinutes": 5,
      "bodyHtml": "<p>Add up the salaries in the room for one hour and you have the true cost of a recurring meeting. We would never approve a purchase that size without a justification, yet standing meetings renew themselves automatically, year after year, long after their reason has faded.</p><h2>Ask what the meeting is for</h2><p>Most meetings quietly try to do three incompatible jobs at once: share information, make a decision, and build relationships. Each needs a different shape. Information can often be a written update. Decisions need the right people and a clear owner. Connection needs space, not an agenda.</p><h3>Match the format to the purpose</h3><ul><li><strong>To inform:</strong> consider a document people read before, not a presentation they sit through.</li><li><strong>To decide:</strong> state the decision and the deadline at the top.</li><li><strong>To connect:</strong> protect unstructured time and resist the urge to fill it.</li></ul><blockquote>If the only outcome of a meeting is scheduling the next meeting, it was an email wearing a costume.</blockquote><div class=\"img-ph\">Image: A weekly calendar with several recurring blocks crossed out in red.</div><h2>Default to ending early</h2><p>Work expands to fill the time allotted, so allot less. A meeting scheduled for thirty minutes that finishes in twenty returns time to everyone and signals respect. Make leaving early a sign of a good meeting, not an awkward one.</p><h2>Audit the standing slots</h2><p>Once a quarter, cancel every recurring meeting and only bring back the ones people actively ask for. The silence around the ones nobody missed is the most honest data you will get all year.</p>"
    },
    {
      "id": "documentation-people-read",
      "slug": "documentation-people-read",
      "title": "Documentation People Actually Read",
      "category": "Practice",
      "byline": "Sofia Alvarez",
      "date": "2026-04-16",
      "excerpt": "The best documentation is not the most complete. It is the kind a tired person can follow at 4 p.m. on a Friday. Write for that reader.",
      "featured": false,
      "readingMinutes": 4,
      "bodyHtml": "<p>There is a particular kind of pride in a thorough document, and a particular kind of disappointment when you discover no one has read it. Completeness and usefulness are not the same thing. The most-read pages in any organization are short, specific, and forgiving of the reader's hurry.</p><h2>Write for the tired reader</h2><p>Picture the person who will actually open this page: late in the day, mid-task, slightly stressed, looking for one answer. Every choice you make should serve that reader. Lead with what they came for. Save the background for those who scroll.</p><blockquote>Nobody reads documentation for pleasure. They read it to get unstuck.</blockquote><h3>Habits that help</h3><ul><li>Put the answer first and the explanation second.</li><li>Use real examples, not abstract placeholders.</li><li>Date the page so readers know if it is stale.</li></ul><div class=\"img-ph\">Image: A single screen showing a short how-to with the key step highlighted.</div><h2>Let it rot gracefully</h2><p>All documentation decays. Rather than pretending otherwise, design for it. A visible last-updated date and a single owner per page do more for trust than any style guide. When readers can see how fresh a page is, they can judge it for themselves, and they will forgive the gaps.</p>"

<script src="export.js"></script>
<script>
/* ===== CONFIG ===================================================
   Paste your Apps Script Web App /exec URL between the quotes.
   Leave empty to use the bundled offline demo.
================================================================= */
const WEB_APP_URL = "";

/* Read the embedded demo data (used when fetch is blocked, e.g. file://). */
function embeddedData(){
  return JSON.parse(document.getElementById("demo-data").textContent);
}

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function fmtDate(d){
  if(!d) return "";
  const dt = new Date(d);
  if(isNaN(dt)) return esc(d);
  return dt.toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"});
}
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

/* Light sanitizer: render body HTML but strip script/style/event handlers.
   The body comes from the trusted Doc converter, but we defensively clean it. */
function sanitize(html){
  const tpl = document.createElement("template");
  tpl.innerHTML = String(html || "");
  tpl.content.querySelectorAll("script,style,iframe,object,embed,link,meta").forEach(n=>n.remove());
  tpl.content.querySelectorAll("*").forEach(el=>{
    [...el.attributes].forEach(attr=>{
      const n = attr.name.toLowerCase();
      const v = attr.value.trim().toLowerCase();
      if(n.startsWith("on")) el.removeAttribute(attr.name);
      if((n === "href" || n === "src") && v.startsWith("javascript:")) el.removeAttribute(attr.name);
    });
  });
  return tpl.innerHTML;
}

function showError(msg){
  document.getElementById("head").innerHTML = "";
  document.getElementById("body").innerHTML =
    '<div class="state error"><p>'+esc(msg)+'</p>'
    + '<p><a class="back-link" style="color:var(--navy-700)" href="index.html">&larr; Back to all articles</a></p></div>';
}

function renderHead(a){
  document.title = a.title + " · Field Notes";
  let meta = 'By ' + esc(a.byline || "Staff");
  if(a.date) meta += ' <span class="dot">&middot;</span> ' + fmtDate(a.date);
  if(a.readingMinutes) meta += ' <span class="dot">&middot;</span> ' + esc(a.readingMinutes) + ' min read';
  document.getElementById("head").innerHTML =
    '<span class="tag">'+esc(a.category||"Article")+'</span>'
    + '<h1>'+esc(a.title)+'</h1>'
    + '<div class="article-meta">'+meta+'</div>';
}

function renderFooterNav(articles, idx){
  const prev = articles[idx-1];
  const next = articles[idx+1];
  let html = '<h2>More from this issue</h2><div class="nav-grid">';
  if(prev){
    html += '<a class="nav-card prev" href="article.html?id='+encodeURIComponent(prev.slug||prev.id)+'">'
         +  '<div class="dir">&larr; Previous</div><div class="nt">'+esc(prev.title)+'</div></a>';
  }else{
    html += '<a class="nav-card prev" href="index.html"><div class="dir">&larr;</div><div class="nt">Table of contents</div></a>';
  }
  if(next){
    html += '<a class="nav-card next" href="article.html?id='+encodeURIComponent(next.slug||next.id)+'">'
         +  '<div class="dir">Next &rarr;</div><div class="nt">'+esc(next.title)+'</div></a>';
  }else{
    html += '<a class="nav-card next" href="index.html"><div class="dir">&rarr;</div><div class="nt">Table of contents</div></a>';
  }
  html += '</div>';
  document.getElementById("footerNav").innerHTML = html;
}

/* Load the publication data with the same priority as the home page:
   1) live Web App URL if configured; 2) the sample-data.json file (http);
   3) the embedded demo data (works when double-clicked over file://). */
async function loadData(){
  if(WEB_APP_URL){
    const res = await fetch(WEB_APP_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("Could not load data (HTTP "+res.status+").");
    return res.json();
  }
  try{
    const res = await fetch("./sample-data.json", {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    return await res.json();
  }catch(err){
    return embeddedData();
  }
}

async function load(){
  const id = getParam("id");
  document.getElementById("body").innerHTML = '<div class="state"><div class="spinner"></div>Loading article&hellip;</div>';
  if(!id){ showError("No article specified."); return; }
  try{
    const data = await loadData();
    const articles = Array.isArray(data.articles) ? data.articles : [];
    const idx = articles.findIndex(a => (a.slug||a.id) === id || a.id === id);
    if(idx === -1){ showError("Article not found: " + id); return; }
    const a = articles[idx];
    renderHead(a);
    document.getElementById("body").innerHTML = sanitize(a.bodyHtml);
    renderFooterNav(articles, idx);
    if(typeof mountExportBar === "function") mountExportBar(a);
  }catch(err){
    showError(err.message || String(err));
  }
}
load();

/* Convert the HTML this project emits into Markdown. Walks nodes with DOMParser;
   unknown tags simply contribute their text. */
function htmlToMarkdown(html){
  const doc = new DOMParser().parseFromString('<div id="__md">'+(html||"")+'</div>', "text/html");
  const root = doc.getElementById("__md");

  function inline(node){
    let out = "";
    node.childNodes.forEach(function(n){
      if(n.nodeType === 3){ out += n.nodeValue; return; }
      if(n.nodeType !== 1){ return; }
      const tag = n.tagName.toLowerCase();
      if(tag === "strong" || tag === "b"){ out += "**" + inline(n) + "**"; }
      else if(tag === "em" || tag === "i"){ out += "*" + inline(n) + "*"; }
      else if(tag === "a"){ out += "[" + inline(n) + "](" + (n.getAttribute("href")||"") + ")"; }
      else if(tag === "br"){ out += "\n"; }
      else { out += inline(n); }
    });
    return out;
  }

  function clean(s){ return s.replace(/[ \t]+/g," ").replace(/\s+\n/g,"\n").trim(); }

  const blocks = [];
  root.childNodes.forEach(function(n){
    if(n.nodeType === 3){
      const t = clean(n.nodeValue);
      if(t) blocks.push(t);
      return;
    }
    if(n.nodeType !== 1){ return; }
    const tag = n.tagName.toLowerCase();
    if(tag === "h2"){ blocks.push("## " + clean(inline(n))); }
    else if(tag === "h3"){ blocks.push("### " + clean(inline(n))); }
    else if(tag === "h4"){ blocks.push("#### " + clean(inline(n))); }
    else if(tag === "h1"){ blocks.push("# " + clean(inline(n))); }
    else if(tag === "p"){ blocks.push(clean(inline(n))); }
    else if(tag === "blockquote"){
      const inner = clean(inline(n));
      blocks.push(inner.split("\n").map(function(l){ return "> " + l; }).join("\n"));
    }
    else if(tag === "ul"){
      const items = [];
      n.querySelectorAll(":scope > li").forEach(function(li){ items.push("- " + clean(inline(li))); });
      blocks.push(items.join("\n"));
    }
    else if(tag === "ol"){
      const items = [];
      let i = 1;
      n.querySelectorAll(":scope > li").forEach(function(li){ items.push((i++) + ". " + clean(inline(li))); });
      blocks.push(items.join("\n"));
    }
    else if(tag === "div" && n.classList.contains("img-ph")){
      const txt = clean(inline(n));
      blocks.push(txt ? "> Image: " + txt : "![Image](placeholder)");
    }
    else if(tag === "hr"){ blocks.push("---"); }
    else {
      const t = clean(inline(n));
      if(t) blocks.push(t);
    }
  });
  return blocks.join("\n\n").trim() + "\n";
}

/* Mount the copy bar for the current single article. */
function mountExportBar(a){
  if(!window.ExportBar) return;
  ExportBar.mount({
    mount: "#exportbar",
    label: "article",
    getHtml: function(){
      return '<h1>'+esc(a.title)+'</h1>'
        + '<p><em>'+esc(a.category||"Article")+' · By '+esc(a.byline||"Staff")+' · '+fmtDate(a.date)+'</em></p>'
        + (a.bodyHtml||"");
    },
    getMarkdown: function(){
      return '# '+(a.title||"")+'\n\n'
        + '*'+(a.category||"Article")+' · By '+(a.byline||"Staff")+' · '+fmtDate(a.date)+'*\n\n'
        + htmlToMarkdown(a.bodyHtml||"");
    }
  });
}

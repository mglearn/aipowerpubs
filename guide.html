<!DOCTYPE html>
<!--
  Guide viewer — renders any project's Markdown guide (setup.md / readme / START-HERE)
  as a clean, readable web page. Usage: guide.html?doc=newsletter-sheets/setup.md
  CC BY-SA 4.0 — Miguel Guhlin (mguhlin@tcea.org | mguhlin.org | https://go.mgpd.org/lftx2606)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root{
    --navy:#002855; --navy-900:#001a3d; --navy-700:#003b7a;
    --gold:#FFB81C; --gold-600:#d99a00;
    --ink:#1a2230; --muted:#5a6577; --bg:#f4f6fa; --card:#ffffff; --border:#e2e8f0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Source Sans 3',-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.7}
  .topbar{background:var(--navy);color:#fff;padding:14px 24px;border-bottom:4px solid var(--gold);
    display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:5}
  .topbar a{color:var(--gold);text-decoration:none;font-weight:700}
  .topbar a:hover{text-decoration:underline}
  .topbar .crumb{color:#cdd9ea;font-size:.9rem}
  .wrap{max-width:820px;margin:30px auto;background:var(--card);border:1px solid var(--border);
    border-radius:14px;box-shadow:0 6px 28px rgba(0,40,85,.08);padding:40px 48px}
  .doc h1{font-family:'Merriweather',serif;color:var(--navy);font-size:2rem;margin:0 0 .4em;
    border-bottom:3px solid var(--gold);padding-bottom:.3em}
  .doc h2{font-family:'Merriweather',serif;color:var(--navy);font-size:1.45rem;margin:1.6em 0 .4em}
  .doc h3{color:var(--navy-700);font-size:1.15rem;margin:1.3em 0 .3em}
  .doc a{color:var(--navy-700)} .doc a:hover{color:var(--gold-600)}
  .doc code{background:#eef2f8;border:1px solid var(--border);border-radius:5px;padding:1px 6px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.88em}
  .doc pre{background:var(--navy-900);color:#e7eefc;border-radius:10px;padding:16px 18px;overflow:auto}
  .doc pre code{background:none;border:0;color:inherit;padding:0}
  .doc blockquote{border-left:4px solid var(--gold);background:#f0f4fa;margin:1em 0;
    padding:10px 18px;border-radius:0 8px 8px 0;color:#33405a}
  .doc table{border-collapse:collapse;width:100%;margin:1em 0;border:1px solid var(--border)}
  .doc th,.doc td{border:1px solid var(--border);padding:9px 12px;text-align:left;vertical-align:top}
  .doc th{background:var(--navy);color:#fff}
  .doc tr:nth-child(even) td{background:#f7f9fc}
  .doc ul,.doc ol{padding-left:24px} .doc li{margin:5px 0}
  .doc hr{border:0;border-top:1px solid var(--border);margin:1.6em 0}
  .doc img{max-width:100%}
  .state{padding:40px;text-align:center;color:var(--muted)}
  .site-footer{background:var(--navy);color:#fff;text-align:center;padding:26px 20px;margin-top:30px}
  .site-footer a{color:var(--gold);text-decoration:none}
  .site-footer a:hover{text-decoration:underline}
  .site-footer .contact-line{color:#cdd9ea;font-size:.92rem;margin-top:6px}
  @media (max-width:600px){.wrap{padding:26px 22px;margin:16px}}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← Back to all examples</a>
  <span class="crumb" id="crumb"></span>
</div>

<div class="wrap">
  <div class="doc" id="doc"><div class="state">Loading guide…</div></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="cc-line"><a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a> &middot; Miguel Guhlin</p>
    <p class="contact-line">
      <a href="mailto:mguhlin@tcea.org">mguhlin@tcea.org</a> &middot;
      <a href="https://mguhlin.org" target="_blank" rel="noopener">mguhlin.org</a> &middot;
      <a href="https://go.mgpd.org/lftx2606" target="_blank" rel="noopener">go.mgpd.org/lftx2606</a>
    </p>
  </div>
</footer>

<script>
const params = new URLSearchParams(location.search);
let doc = params.get("doc") || "START-HERE.md";

// Only allow same-site relative .md paths (no protocols, no parent traversal).
function safe(p){
  return /\.md$/i.test(p) && !/^[a-z]+:\/\//i.test(p) && !/^\/\//.test(p) && !p.includes("..");
}

const docEl = document.getElementById("doc");
const crumbEl = document.getElementById("crumb");

async function show(){
  if(!safe(doc)){
    docEl.innerHTML = '<div class="state">Invalid guide path.</div>';
    return;
  }
  crumbEl.textContent = doc;
  try{
    const res = await fetch(doc);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const md = await res.text();
    render(md);
  }catch(err){
    docEl.innerHTML = '<div class="state"><h2 style="color:var(--navy)">Open this on the web to view it</h2>'+
      '<p>This rendered guide loads the file <code>'+doc.replace(/</g,"&lt;")+'</code>, which browsers '+
      'block when you open the page by double-clicking it.</p>'+
      '<p>View it on the hosted site, or simply open <code>'+doc.replace(/</g,"&lt;")+'</code> '+
      'directly in any text editor — it is plain Markdown.</p></div>';
  }
}

function render(md){
  const html = marked.parse(md);
  docEl.innerHTML = DOMPurify.sanitize(html);
  // Make external links open in a new tab.
  docEl.querySelectorAll('a[href^="http"]').forEach(a=>{a.target="_blank";a.rel="noopener";});
  const h1 = docEl.querySelector("h1");
  if(h1) document.title = h1.textContent + " — Guide";
}
show();
</script>
</body>
</html>
